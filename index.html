<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #007bff;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        .hero {
            padding: 50px 20px;
            background: url('hero-bg.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
        }
        .features {
            display: flex;
            justify-content: space-around;
            padding: 50px 20px;
            background-color: #fff;
        }
        .feature {
            flex: 1;
            margin: 0 10px;
            text-align: center;
        }
        .cta {
            padding: 30px 20px;
            text-align: center;
            background-color: #007bff;
            color: white;
        }
        .cta button {
            padding: 10px 20px;
            background: #28a745;
            border: none;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .features {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Claude Code</h1>
</header>

<section class="hero">
    <h2>Your Coding Companion</h2>
    <p>Effortlessly improve your coding skills with personalized features and tools.</p>
</section>

<section class="features">
    <div class="feature">
        <h3>Feature 1</h3>
        <p>Description of feature 1.</p>
    </div>
    <div class="feature">
        <h3>Feature 2</h3>
        <p>Description of feature 2.</p>
    </div>
    <div class="feature">
        <h3>Feature 3</h3>
        <p>Description of feature 3.</p>
    </div>
</section>

<section class="cta">
    <h2>Ready to get started?</h2>
    <button>Sign Up Now</button>
</section>

</body>
</html>
